<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Admin - Dashboard</title>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico" />
    <link rel="stylesheet" href="../css/styles.css">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>

  <body>
    <div id="header">
      <div>
        <h1>E-Commerce</h1>
      </div>
      <div id="btns">
        <button id="productsBtn">Products</button>
        <button id="ordersBtn">Orders</button>
        <button id="logoutBtn">Logout</button>
      </div>
    </div>

    <h2 style="text-align:center; color:cadetblue; margin-top:30px;">Admin Dashboard</h2>

    <!-- KPI Cards -->
    <div id="kpi-container">
      <div class="kpi-card">
        <h3>Total Revenue</h3>
        <p id="totalRevenue">$0</p>
      </div>
      <div class="kpi-card">
        <h3>Total Orders</h3>
        <p id="totalOrders">0</p>
      </div>
      <div class="kpi-card">
        <h3>Total Users</h3>
        <p id="totalUsers">0</p>
      </div>
      <div class="kpi-card">
        <h3>Total Products</h3>
        <p id="totalProducts">0</p>
      </div>
    </div>

    <!-- Recent Orders -->
    <div id="recentOrders">
      <h2>Recent Orders</h2>
      <div id="recentOrders-container"></div>
    </div>

    <!-- Charts -->
    <div id="charts-container">
      <div class="chart-box">
        <h3>Revenue Over Time</h3>
        <canvas id="revenueChart"></canvas>
      </div>
      <div class="chart-box">
        <h3>Orders by Status</h3>
        <canvas id="statusChart"></canvas>
      </div>
    </div>

    <!-- CSV Export -->
    <div id="exportDiv">
      <button id="exportBtn">Export Orders as CSV</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
